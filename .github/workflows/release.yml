name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

# Default permissions for every job in this workflow. The release job below
# elevates to contents: write only for the tightly-scoped publish step.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          go-version: "1.25"

      - name: Verify module builds
        run: go build ./...

      - name: Run tests
        run: go test ./...

  release:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Tag a release as a prerelease when the tag contains a hyphen
          # (for example v0.1.0-rc1). This prevents prerelease versions from
          # being surfaced as the project's latest stable release.
          args=(--title "${GITHUB_REF_NAME}" --generate-notes --verify-tag)
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            args+=(--prerelease)
          fi
          gh release create "${GITHUB_REF_NAME}" "${args[@]}"
